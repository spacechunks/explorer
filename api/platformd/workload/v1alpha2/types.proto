syntax = "proto3";

package platformd.workload.v1alpha2;

import "chunk/v1alpha1/types.proto";
import "user/v1alpha1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/spacechunks/explorer/api/platformd/workload/v1alpha2";

// WorkloadMetadata is basic metadata about the workload.
// Some of this information will be made available to the
// minecraft server via the metadata service.
message WorkloadMetadata {
  // id is a universally unique value identifying the workload.
  // currently this is in UUIDv7 format.
  string id = 1;

  chunk.v1alpha1.Chunk chunk = 2;

  chunk.v1alpha1.FlavorVersion flavor_version = 3;

  // contains an opaque identifier representing the player
  // that ordered the creation this instance. ordered_by and
  // owner of the instance are not necessarily the same.
  string ordered_by = 4;
}

enum WorkloadState {
  UNKNOWN = 0;
  STARTING = 1;
  RUNNING = 2;
  DELETING = 3;
  DELETED = 4;
  CREATION_FAILED = 5;
}

message WorkloadStatus {
  WorkloadState state = 2;

  // port allocated for the workload. programs binding
  // to this port will be reachable from the internet.
  uint32 port = 3;
}
