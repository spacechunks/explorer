name: test-functional-platformd
on:
  pull_request:
permissions:
  contents: read
jobs:
  test-functional:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - run: sudo groupadd platformd -g 9012 && sudo useradd platformd -u 9012 -g 9012
      - run: make functests-platformd
        env:
          # required by github.com/lestrrat-go/jwx/v4
          GOEXPERIMENT: jsonv2