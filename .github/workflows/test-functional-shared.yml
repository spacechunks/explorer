name: test-functional-shared
on:
  pull_request:
permissions:
  contents: read
jobs:
  test-functional:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - run: make functests-shared
        env:
          # required by github.com/lestrrat-go/jwx/v4
          GOEXPERIMENT: jsonv2