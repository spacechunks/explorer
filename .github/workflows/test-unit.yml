name: test-unit
on:
  pull_request:
permissions:
  contents: read
jobs:
  test-unit:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - uses: docker/setup-buildx-action@v4
      - run: make unittests
        env:
          # required by github.com/lestrrat-go/jwx/v4
          GOEXPERIMENT: jsonv2